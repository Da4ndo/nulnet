name: Feature request
description: Suggest an improvement to the agent, API, telemetry, or install flow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you are trying to solve and how nulnet could help.
        Requests for **nulctl** belong in [nulnet/nulctl](https://github.com/nulnet/nulctl/issues/new/choose).

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What limitation or workflow pain does this address?
      placeholder: |
        I'm trying to … but nulnet currently …
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? API shape, config key, telemetry field, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or tools you considered
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Telemetry collection
        - JSON-RPC API
        - Self-update / CDN
        - Install script / systemd
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: This request is for the nulnet agent (not nulctl)
          required: true
