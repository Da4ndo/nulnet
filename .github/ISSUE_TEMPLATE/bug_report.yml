name: Bug report
description: Something is broken in the agent, API, telemetry, or self-update
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Client-side issues with **nulctl** belong in
        [nulnet/nulctl](https://github.com/Da4ndo/nulctl/issues/new/choose).

  - type: input
    id: version
    attributes:
      label: Agent version
      description: Output of `nulnet --version`, `agent.version` via nulctl, or the release tag you installed
      placeholder: e.g. 1.3.2
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: How was nulnet installed?
      options:
        - install.sh from GitHub Releases
        - Custom CDN (NULNET_CDN_BASE)
        - Built from source (cargo build)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, and systemd version if relevant
      placeholder: |
        e.g. Debian 12 (bookworm), x86_64
        systemd 252
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the problem
      placeholder: |
        1. Install with …
        2. Configure …
        3. Run …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact secrets (Ed25519 keys, tokens). `journalctl -u nulnet -n 100` is especially helpful.
      render: shell
      placeholder: |
        sudo journalctl -u nulnet -n 50 --no-pager
    validations:
      required: false

  - type: textarea
    id: config
    attributes:
      label: Config (optional)
      description: Relevant parts of `/opt/nulnet/config.toml` — redact `allowed_keys` if needed
      render: toml
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I redacted sensitive values from logs and config
          required: true
