name: Release nulnet

# Runs when you publish a release in GitHub (UI or API). Does not create the release.
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-musl
            artifact: nulnet
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            artifact: nulnet-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust stable
        run: rustup update stable --no-self-update && rustup default stable

      - name: Add musl target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.rust_target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.rust_target }}-cargo-

      - name: Build nulnet
        run: cargo build --release --locked --target ${{ matrix.rust_target }}

      - name: Prepare release artifacts
        run: |
          BIN=target/${{ matrix.rust_target }}/release/nulnet
          strip "$BIN"
          sha256sum "$BIN" | awk '{print $1}' > ${{ matrix.artifact }}.sha256
          cp "$BIN" ${{ matrix.artifact }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          cp artifacts/nulnet/nulnet .
          cp artifacts/nulnet/nulnet.sha256 .
          cp artifacts/nulnet-aarch64/nulnet-aarch64 .
          cp artifacts/nulnet-aarch64/nulnet-aarch64.sha256 .
          cp systemd/nulnet.service nulnet.service
          cp scripts/install.sh install.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            --clobber \
            -R "${{ github.repository }}" \
            nulnet \
            nulnet.sha256 \
            nulnet-aarch64 \
            nulnet-aarch64.sha256 \
            nulnet.service \
            install.sh
