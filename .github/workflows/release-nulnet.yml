name: Release nulnet

# Runs when you publish a release in GitHub (UI or API). Does not create the release.
on:
  release:
    types: [published]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Rust stable
        run: rustup update stable --no-self-update && rustup default stable

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build nulnet
        run: cargo build --release --locked

      - name: Prepare release artifacts
        run: |
          BIN=target/release/nulnet
          strip "$BIN"
          sha256sum "$BIN" | awk '{print $1}' > nulnet.sha256
          cp "$BIN" nulnet
          cp systemd/nulnet.service nulnet.service
          cp scripts/install.sh install.sh

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            --clobber \
            nulnet \
            nulnet.sha256 \
            nulnet.service \
            install.sh
